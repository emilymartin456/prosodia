[mypy]
warn_redundant_casts = True
warn_unused_ignores = False
no_implicit_optional = True
check_untyped_defs = True
ignore_missing_imports = True
files = prosodia

# numpy ships PEP 695 stubs that only parse under newer targets; we don't need
# to type-check numpy itself, so skip following into it.
[mypy-numpy.*]
follow_imports = skip

[mypy-tests.*]
ignore_errors = True
